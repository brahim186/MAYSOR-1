<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi des Inscriptions | Diwan Al Maaref</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="logo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Fraunces:wght@500;600&family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy:  { DEFAULT:'#1B1464', 700:'#170F52', 900:'#100B3B' },
          purple:{ DEFAULT:'#5B3AA6' },
          gold:  { DEFAULT:'#F0A93C', light:'#FBC873', dark:'#D98F1F' },
          ink:   '#221D3D', mist:'#F6F4FC', line:'#E7E2F3',
        },
        fontFamily: { sans: ['Inter','sans-serif'], display: ['Fraunces','serif'] }
      }
    }
  }
</script>
<style>
  body { font-family:'Inter', sans-serif; color:#221D3D; background:#F6F4FC; }
  .font-display { font-family:'Fraunces', serif; }
  a:focus-visible, button:focus-visible, select:focus-visible { outline: 2px solid #F0A93C; outline-offset: 2px; border-radius: 6px; }
  .row-enter { animation: rowEnter .35s cubic-bezier(.2,.8,.25,1) both; }
  @keyframes rowEnter { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .badge-pending  { background:#FDF4E3; color:#B7791F; }
  .badge-accepted { background:#D1FAE5; color:#047857; }
  .badge-refused  { background:#FEE2E2; color:#B91C1C; }
</style>
</head>

<body class="antialiased min-h-screen">

<header class="sticky top-0 z-30 bg-white/95 backdrop-blur border-b border-line">
  <div class="max-w-6xl mx-auto px-5 sm:px-8 h-20 flex items-center justify-between gap-4">
    <div class="flex items-center gap-3">
      <img src="logo.png" alt="Logo Diwan Al Maaref" class="h-11 w-11 object-contain">
      <div class="hidden sm:flex flex-col leading-tight">
        <span class="font-display font-semibold text-navy text-base">Suivi des Inscriptions</span>
        <span class="text-[11px] text-gold-dark font-bold">Diwan Al Maaref</span>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <a href="espace-administration.html" class="inline-flex items-center gap-2 text-xs font-bold text-navy/70 hover:text-gold-dark border border-line rounded-full px-4 py-2.5 transition-colors bg-white">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="hidden sm:inline">Espace Administration</span>
      </a>
      <button id="logoutBtn" type="button" class="inline-flex items-center gap-2 text-xs font-bold text-rose-600 hover:text-white hover:bg-rose-600 border border-rose-200 rounded-full px-4 py-2.5 transition-colors bg-rose-50">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="hidden sm:inline">Déconnexion</span>
      </button>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-5 sm:px-8 py-12 flex flex-col gap-6">

  <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
    <div>
      <h2 class="font-display font-semibold text-navy text-3xl">Demandes d'Inscription</h2>
      <p class="text-ink/50 text-sm mt-2">Consultez et traitez les dossiers reçus.</p>
    </div>
    <a href="liste-eleves-admis.html" class="inline-flex items-center gap-2 text-xs font-bold text-navy border border-line rounded-full px-4 py-2.5 bg-white hover:border-gold">
      Voir les élèves admis
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
  </div>

  <div class="flex flex-wrap items-center gap-3">
    <select id="statusFilter" class="rounded-full border border-line bg-white px-4 py-2 text-xs font-bold text-navy focus:border-gold outline-none">
      <option value="">Tous les statuts</option>
      <option value="En attente">En attente</option>
      <option value="Accepté">Accepté</option>
      <option value="Refusé">Refusé</option>
    </select>
    <span id="countBadge" class="text-xs font-extrabold text-navy/60 bg-mist rounded-full px-3 py-1.5">0 dossier</span>
  </div>

  <section class="bg-white border border-line rounded-3xl shadow-sm overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="text-left text-[11px] font-extrabold uppercase tracking-wide text-ink/40 bg-mist/60">
            <th class="px-6 sm:px-8 py-3.5 whitespace-nowrap">Matricule</th>
            <th class="px-4 py-3.5 whitespace-nowrap">Prénom</th>
            <th class="px-4 py-3.5 whitespace-nowrap">Nom</th>
            <th class="px-4 py-3.5 whitespace-nowrap">Niveau</th>
            <th class="px-4 py-3.5 whitespace-nowrap">Tél. urgence</th>
            <th class="px-4 py-3.5 whitespace-nowrap">Statut</th>
            <th class="px-4 sm:px-8 py-3.5 whitespace-nowrap text-right">Action</th>
          </tr>
        </thead>
        <tbody id="tableBody" class="divide-y divide-line">
          <tr><td colspan="7" class="text-center py-8 text-navy/50">Chargement...</td></tr>
        </tbody>
      </table>
    </div>
    <div id="emptyState" class="hidden px-8 py-14 text-center">
      <p class="text-ink/40 text-sm">Aucune demande d'inscription pour le moment.</p>
    </div>
  </section>

</main>

<script type="module">
  import { auth, db, signOut, collection, getDocs, doc, updateDoc, requireAdmin } from './firebase-config.js';

  let allRecords = [];

  function statusBadge(statut) {
    if (statut === 'Accepté') return 'badge-accepted';
    if (statut === 'Refusé') return 'badge-refused';
    return 'badge-pending';
  }

  function applyFilter() {
    const status = document.getElementById('statusFilter').value;
    const filtered = status ? allRecords.filter((r) => r.statut === status) : allRecords;
    render(filtered);
  }

  function render(records) {
    const tbody = document.getElementById('tableBody');
    const emptyState = document.getElementById('emptyState');
    document.getElementById('countBadge').textContent = records.length + (records.length > 1 ? ' dossiers' : ' dossier');

    if (records.length === 0) {
      tbody.innerHTML = '';
      emptyState.classList.remove('hidden');
      return;
    }
    emptyState.classList.add('hidden');

    tbody.innerHTML = '';
    records.forEach((r) => {
      const tr = document.createElement('tr');
      tr.className = 'row-enter hover:bg-mist/50 transition-colors';
      tr.innerHTML = `
        <td class="px-6 sm:px-8 py-4 font-mono text-xs font-bold text-purple whitespace-nowrap">${r.id}</td>
        <td class="px-4 py-4 whitespace-nowrap">${r.prenom || '—'}</td>
        <td class="px-4 py-4 font-bold text-navy whitespace-nowrap">${r.nom || '—'}</td>
        <td class="px-4 py-4 whitespace-nowrap">${r.niveau || '—'}</td>
        <td class="px-4 py-4 whitespace-nowrap text-ink/60">${r.telUrgence || '—'}</td>
        <td class="px-4 py-4 whitespace-nowrap">
          <span class="inline-block text-[11px] font-extrabold rounded-full px-3 py-1 ${statusBadge(r.statut)}">${r.statut || 'En attente'}</span>
        </td>
        <td class="px-4 sm:px-8 py-4 whitespace-nowrap text-right">
          <select data-id="${r.id}" class="statusSelect text-xs font-bold border border-line rounded-full px-3 py-1.5 outline-none focus:border-gold">
            <option value="En attente" ${r.statut === 'En attente' ? 'selected' : ''}>En attente</option>
            <option value="Accepté" ${r.statut === 'Accepté' ? 'selected' : ''}>Accepté</option>
            <option value="Refusé" ${r.statut === 'Refusé' ? 'selected' : ''}>Refusé</option>
          </select>
        </td>
      `;
      tbody.appendChild(tr);
    });

    tbody.querySelectorAll('.statusSelect').forEach((sel) => {
      sel.addEventListener('change', async () => {
        const id = sel.getAttribute('data-id');
        const newStatus = sel.value;
        sel.disabled = true;
        try {
          await updateDoc(doc(db, 'students', id), { statut: newStatus });
          const rec = allRecords.find((r) => r.id === id);
          if (rec) rec.statut = newStatus;
          applyFilter();
        } catch (e) {
          alert('Erreur lors de la mise à jour du statut.');
        } finally {
          sel.disabled = false;
        }
      });
    });
  }

  document.getElementById('statusFilter').addEventListener('change', applyFilter);

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = 'connexion.html';
  });

  requireAdmin(async () => {
    try {
      const snap = await getDocs(collection(db, 'students'));
      allRecords = snap.docs
        .map((d) => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (b.horodatage || '').localeCompare(a.horodatage || ''));
      applyFilter();
    } catch (e) {
      document.getElementById('tableBody').innerHTML =
        `<tr><td colspan="7" class="text-center py-8 text-rose-600 font-bold">Erreur de chargement des dossiers.</td></tr>`;
    }
  });
</script>

</body>
</html>
