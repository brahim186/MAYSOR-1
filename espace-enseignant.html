<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzp02iIFpmApUG9TwgOZCU9Fi6plJuEvICC2z2znb2urpqb_dqzTDjssoTF2Fv6ij6ZlQ/exec"; 
  let currentTeacher = null;

  try {
    const authRaw = sessionStorage.getItem('diwanTeacherAuth');
    if (!authRaw) {
      window.location.replace('connexion-enseignant.html');
    } else {
      currentTeacher = JSON.parse(authRaw); 
    }
  } catch (e) {
    window.location.replace('connexion-enseignant.html');
  }

  function levelBadgeClass(lvl) {
    const m = {
      'Maternelle': 'bg-emerald-50 text-emerald-700 border border-emerald-200/60',
      'Primaire':   'bg-purple/5 text-purple border border-purple/10',
      'Collège':    'bg-gold/5 text-gold-dark border border-gold/10'
    };
    return m[lvl] || 'bg-mist text-ink/60';
  }

  function groupBadgeClass(grp) {
    return 'bg-navy/5 text-navy border border-navy/10';
  }

  if (currentTeacher) {
    document.getElementById('welcomeTitle').textContent = `Bonjour, ${currentTeacher.prenom} ${currentTeacher.nom}`;
    document.getElementById('infoGenre').textContent = currentTeacher.genre || '—';
    document.getElementById('infoTelephone').textContent = currentTeacher.telephone || '—';
    document.getElementById('infoAdresse').textContent = currentTeacher.adresse || '—';
    document.getElementById('infoGroupe').textContent = currentTeacher.groupe || '—';

    const classesWrap = document.getElementById('classesWrap');
    const niveau = currentTeacher.niveau; 
    const groupe = currentTeacher.groupe;

    if (niveau) {
      const span = document.createElement('span');
      span.className = `inline-flex items-center gap-1.5 text-xs font-extrabold rounded-full px-3.5 py-2 ${levelBadgeClass(niveau)}`;
      span.textContent = `${niveau} — ${groupe}`;
      classesWrap.appendChild(span);
    } else {
      classesWrap.innerHTML = '<p class="text-ink/40 text-sm">Aucune classe assignée pour le moment.</p>';
    }

    async function fetchMyStudents() {
      const tbody = document.getElementById('studentsTableBody');
      const emptyState = document.getElementById('emptyState');
      tbody.innerHTML = `<tr><td colspan="5" class="text-center py-6 text-navy/50">Chargement des élèves...</td></tr>`;

      try {
        const response = await fetch(`${API_URL}?action=getTeacherStudents&niveau=${encodeURIComponent(niveau)}&groupe=${encodeURIComponent(groupe)}`);
        const data = await response.json();

        tbody.innerHTML = '';
        if (data.status !== 'success' || !data.records || data.records.length === 0) {
          emptyState.classList.remove('hidden');
          document.getElementById('studentCount').textContent = '0 élève';
          return;
        }

        emptyState.classList.add('hidden');
        const myStudents = data.records;
        document.getElementById('studentCount').textContent = myStudents.length + (myStudents.length > 1 ? ' élèves' : ' élève');

        myStudents.forEach((s) => {
          const tr = document.createElement('tr');
          tr.className = 'row-enter hover:bg-mist/50 transition-colors';
          tr.innerHTML = `
            <td class="px-6 sm:px-8 py-4 font-bold text-navy whitespace-nowrap">${s.nom}</td>
            <td class="px-4 py-4 whitespace-nowrap">${s.prenom}</td>
            <td class="px-4 py-4 whitespace-nowrap font-mono text-xs font-bold text-purple">${s.matricule}</td>
            <td class="px-4 py-4 whitespace-nowrap"><span class="inline-block text-[11px] font-extrabold rounded-full px-3 py-1 ${levelBadgeClass(s.niveau)}">${s.niveau}</span></td>
            <td class="px-4 sm:px-8 py-4 whitespace-nowrap"><span class="inline-block text-[11px] font-extrabold rounded-full px-3 py-1 ${groupBadgeClass(s.groupe)}">${s.groupe}</span></td>
          `;
          tbody.appendChild(tr);
        });

      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="5" class="text-center py-6 text-rose-600 font-bold">Erreur lors du chargement des élèves.</td></tr>`;
      }
    }

    fetchMyStudents();
  }

  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('diwanTeacherAuth');
    window.location.href = 'connexion-enseignant.html';
  });
</script>
