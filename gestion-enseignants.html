<script>
  // ضع رابط الـ Web App الخاص بك هنا
  const API_URL = "https://script.google.com/macros/s/AKfycbzp02iIFpmApUG9TwgOZCU9Fi6plJuEvICC2z2znb2urpqb_dqzTDjssoTF2Fv6ij6ZlQ/exec"; 

  // جلب التوكن المخزن فالسيسن تلقائياً حيت كيكون تسجل فاش الأدمين كيدير الدخول لـ لوحة التحكم
  const ADMIN_TOKEN = sessionStorage.getItem('diwanAdminAuth') || ''; 

  // حماية الصفحة: إلا ماكانش الأدمن مسجل الدخول، كيرجعو لصفحة الدخول نيشان
  if (!ADMIN_TOKEN) {
    window.location.replace('connexion.html'); 
  }

  const form          = document.getElementById('teacherForm');
  const tableBody     = document.getElementById('teachersTableBody');
  const emptyState    = document.getElementById('emptyState');
  const countBadge    = document.getElementById('teacherCount');
  const formError     = document.getElementById('formError');
  const toast         = document.getElementById('toast');
  const toastMessage  = document.getElementById('toastMessage');

  function showToast(msg) {
    toastMessage.textContent = msg;
    toast.classList.remove('translate-y-12', 'opacity-0');
    setTimeout(() => {
      toast.classList.add('translate-y-12', 'opacity-0');
    }, 3000);
  }

  function levelBadgeClass(lvl) {
    const m = {
      'Maternelle': 'bg-emerald-50 text-emerald-700 border border-emerald-200/60',
      'Primaire':   'bg-purple/5 text-purple border border-purple/10',
      'Collège':    'bg-gold/5 text-gold-dark border border-gold/10'
    };
    return m[lvl] || 'bg-mist text-ink/60';
  }

  function groupBadgeClass(grp) {
    if(grp === 'Non assigné') return 'bg-rose-50 text-rose-600 border border-rose-200/60';
    return 'bg-navy/5 text-navy border border-navy/10';
  }

  function formatSalaire(num) {
    return new Intl.NumberFormat('fr-MA', { style: 'currency', currency: 'MAD', maximumFractionDigits: 0 }).format(num);
  }

  function generateUsername(prenom, nom, existing) {
    let base = (prenom.charAt(0) + nom.replace(/\s+/g, '')).toLowerCase();
    base = base.normalize("NFD").replace(/[\u0300-\u036f]/g, ""); // حذف الحركات
    let username = 't.' + base;
    let counter = 1;
    while (existing.includes(username)) {
      username = 't.' + base + counter;
      counter++;
    }
    return username;
  }

  function generatePassword() {
    return Math.floor(100000 + Math.random() * 900000).toString();
  }

  // جلب الأساتذة من الـ API المشفر
  async function render() {
    tableBody.innerHTML = `<tr><td colspan="11" class="text-center py-6 text-navy/50">Chargement des enseignants...</td></tr>`;
    
    try {
      const response = await fetch(`${API_URL}?action=getTeachers&token=${encodeURIComponent(ADMIN_TOKEN)}`);
      const data = await response.json();
      
      tableBody.innerHTML = '';
      if (data.status !== 'success' || !data.records || data.records.length === 0) {
        emptyState.classList.remove('hidden');
        countBadge.textContent = '0 enseignant';
        return;
      }
      
      emptyState.classList.add('hidden');
      const teachers = data.records;

      teachers.forEach((t) => {
        const tr = document.createElement('tr');
        tr.className = 'row-enter hover:bg-mist/50 transition-colors';
        tr.innerHTML = `
          <td class="px-6 sm:px-8 py-4 font-bold text-navy whitespace-nowrap">${t.Nom}</td>
          <td class="px-4 py-4 whitespace-nowrap">${t.Prenom}</td>
          <td class="px-4 py-4 whitespace-nowrap">${t.Genre}</td>
          <td class="px-4 py-4 text-ink/60 max-w-[180px] truncate" title="${t.Adresse}">${t.Adresse}</td>
          <td class="px-4 py-4 whitespace-nowrap text-ink/60">${t.Telephone}</td>
          <td class="px-4 py-4 whitespace-nowrap"><span class="inline-block text-[11px] font-extrabold rounded-full px-3 py-1 ${levelBadgeClass(t.Niveau)}">${t.Niveau}</span></td>
          <td class="px-4 py-4 whitespace-nowrap"><span class="inline-block text-[11px] font-extrabold rounded-full px-3 py-1 ${groupBadgeClass(t.Groupe)}">${t.Groupe}</span></td>
          <td class="px-4 py-4 whitespace-nowrap font-bold text-emerald-600">${formatSalaire(t.Salaire)}</td>
          <td class="px-4 py-4 whitespace-nowrap font-mono text-xs font-bold text-purple">${t.Username}</td>
          <td class="px-4 py-4 whitespace-nowrap font-mono text-xs font-bold text-gold-dark">${t.Password}</td>
          <td class="px-4 sm:px-8 py-4 whitespace-nowrap text-right">
            <button data-id="${t.ID}" class="deleteBtn inline-flex items-center gap-1.5 text-xs font-bold text-rose-500 hover:text-rose-700 transition-colors">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Supprimer
            </button>
          </td>
        `;
        tableBody.appendChild(tr);
      });

      countBadge.textContent = teachers.length + (teachers.length > 1 ? ' enseignants' : ' enseignant');

      // تفعيل زر الحذف آلياً عبر الـ API
      document.querySelectorAll('.deleteBtn').forEach((btn) => {
        btn.addEventListener('click', async () => {
          if(!confirm("Voulez-vous vraiment supprimer cet enseignant ?")) return;
          const id = btn.getAttribute('data-id');
          btn.disabled = true;
          btn.textContent = "Suppression...";
          
          try {
            const res = await fetch(`${API_URL}?action=deleteTeacher&id=${id}&token=${encodeURIComponent(ADMIN_TOKEN)}`);
            const resData = await res.json();
            if(resData.status === 'success') {
              showToast("Enseignant supprimé avec succès");
              render();
            } else {
              alert("Erreur: " + resData.message);
              render();
            }
          } catch(e) { alert("Erreur serveur."); }
        });
      });

    } catch(e) {
      tableBody.innerHTML = `<tr><td colspan="11" class="text-center py-6 text-rose-600 font-bold">Erreur de connexion au serveur.</td></tr>`;
    }
  }

  // إضافة أستاذ جديد
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const nom       = document.getElementById('nom').value.trim();
    const prenom    = document.getElementById('prenom').value.trim();
    const genre     = document.getElementById('genre').value;
    const adresse   = document.getElementById('adresse').value.trim();
    const telephone = document.getElementById('telephone').value.trim();
    const niveau    = document.getElementById('niveau').value;
    const groupe    = document.getElementById('groupe').value;
    const salaire   = document.getElementById('salaire').value;

    if (!nom || !prenom || !genre || !adresse || !telephone || !niveau || !groupe || salaire === '') {
      formError.classList.remove('hidden');
      return;
    }
    formError.classList.add('hidden');

    let existingUsernames = [];
    try {
      const response = await fetch(`${API_URL}?action=getTeachers&token=${encodeURIComponent(ADMIN_TOKEN)}`);
      const data = await response.json();
      if(data.records) existingUsernames = data.records.map(t => t.Username);
    } catch(e){}

    const username = generateUsername(prenom, nom, existingUsernames);
    const password = generatePassword();

    const teacherData = { nom, prenom, genre, adresse, telephone, niveau, groupe, salaire: Number(salaire), username, password };

    const submitBtn = form.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    submitBtn.textContent = "Ajout en cours...";

    try {
      const res = await fetch(`${API_URL}?action=addTeacher&token=${encodeURIComponent(ADMIN_TOKEN)}`, {
        method: 'POST',
        body: JSON.stringify(teacherData)
      });
      const result = await res.json();
      
      if(result.status === 'success') {
        showToast(`Enseignant ajouté — ID : ${username}`);
        form.reset();
        render();
      } else {
        alert("Erreur lors de l'ajout: " + result.message);
      }
    } catch(err) {
      alert("Erreur de connexion.");
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg> Ajouter l'enseignant`;
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('diwanAdminAuth');
    window.location.href = 'connexion.html';
  });

  render();
</script>
